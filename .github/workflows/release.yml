name: Build and Release Wheels

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  checks:
    name: Lint and Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout mfac_toolkit
        uses: actions/checkout@v4

      - name: Checkout private mfac_core
        uses: actions/checkout@v4
        with:
          repository: Zhaojq2003/mfac_core
          token: ${{ secrets.MFAC_CORE_TOKEN }}
          path: mfac_core

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies and run checks
        run: |
          uv sync --extra dev --group dev
          uv run ruff check .
          uv run mypy .
          uv run pytest

  build-wheels:
    name: Build wheels on ${{ matrix.os }}
    needs: checks
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout mfac_toolkit
        uses: actions/checkout@v4

      - name: Checkout private mfac_core
        uses: actions/checkout@v4
        with:
          repository: Zhaojq2003/mfac_core
          token: ${{ secrets.MFAC_CORE_TOKEN }}
          path: mfac_core

      - name: Install Rust toolchain
        if: runner.os != 'Linux'
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.19
        env:
          # Linux manylinux image for glibc compatibility.
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux2014
          # abi3-py312 wheel covers Python 3.12+.
          CIBW_BUILD: cp312-*
          # Windows: 64-bit only.
          CIBW_ARCHS_WINDOWS: AMD64
          # Linux: x86_64 only.
          CIBW_ARCHS_LINUX: x86_64
          # Skip 32-bit, PyPy, ARM64 and musl builds.
          CIBW_SKIP: pp* *-win32 *-manylinux_i686 *-musllinux_* *-aarch64
          # Install Rust inside the manylinux container (Linux only).
          CIBW_BEFORE_BUILD_LINUX: curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          CIBW_ENVIRONMENT_LINUX: PATH="$HOME/.cargo/bin:$PATH"

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  publish-pypi:
    name: Publish to PyPI
    needs: build-wheels
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/mfac-toolkit
    steps:
      - name: Download wheels
        uses: actions/download-artifact@v4
        with:
          path: wheelhouse
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          packages-dir: wheelhouse/

  publish-github-release:
    name: Create GitHub Release
    needs: build-wheels
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download wheels
        uses: actions/download-artifact@v4
        with:
          path: wheelhouse
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: wheelhouse/*.whl
          generate_release_notes: true
          fail_on_unmatched_files: true
